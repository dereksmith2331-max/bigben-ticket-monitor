name: Big Ben Ticket Monitor

on:
  schedule:
    # EDT = UTC-4 (summer). Aug 4-6 is in EDT.
    - cron: "0 6 * * *"    # 02:00 EDT
    - cron: "0 12 * * *"   # 08:00 EDT
    - cron: "0 18 * * *"   # 14:00 EDT
    - cron: "0 0 * * *"    # 20:00 EDT

  # Manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Check if monitoring window has passed
        id: date_check
        run: |
          TODAY=$(date -u +%Y%m%d)
          DEADLINE=20260807
          if [ "$TODAY" -gt "$DEADLINE" ]; then
            echo "expired=true" >> $GITHUB_OUTPUT
            echo "Monitoring window has passed (today: $TODAY). Skipping."
          else
            echo "expired=false" >> $GITHUB_OUTPUT
            echo "Within monitoring window (today: $TODAY). Proceeding."
          fi

      - name: Check out repository
        if: steps.date_check.outputs.expired == 'false'
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        if: steps.date_check.outputs.expired == 'false'
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.date_check.outputs.expired == 'false'
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run ticket checker
        if: steps.date_check.outputs.expired == 'false'
        id: checker
        run: python check_tickets.py
        continue-on-error: true

      - name: Read availability result
        if: steps.date_check.outputs.expired == 'false'
        id: result
        run: |
          if [ -f availability_result.json ]; then
            DATES=$(python -c "
import json
with open('availability_result.json') as f:
    data = json.load(f)
print(', '.join(data['available_dates']))
            ")
            echo "dates=$DATES" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Open or update GitHub Issue alert
        if: |
          steps.date_check.outputs.expired == 'false' &&
          steps.result.outputs.found == 'true'
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const dates = "${{ steps.result.outputs.dates }}";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Check for an existing open alert issue to avoid inbox spam
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ticket-alert',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `**Still available** as of ${new Date().toUTCString()}\n\nDates: ${dates}\n\n[View run](${runUrl})`,
              });
              console.log(`Updated existing issue #${issues.data[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔔 Big Ben tickets available: ${dates}`,
                labels: ['ticket-alert'],
                body: [
                  '## Big Ben Tour tickets are available!',
                  '',
                  `**Available dates:** ${dates}`,
                  '',
                  '**Book now:** https://tickets.parliament.uk/timeslot/big-ben-tour',
                  '',
                  `**Detected at:** ${new Date().toUTCString()}`,
                  '',
                  `[View check run](${runUrl})`,
                  '',
                  '---',
                  '_Close this issue once you have booked or confirmed availability is gone._',
                ].join('\n'),
              });
              console.log(`Opened new alert issue #${issue.data.number}`);
            }

      - name: Log no-availability result
        if: |
          steps.date_check.outputs.expired == 'false' &&
          steps.result.outputs.found != 'true' &&
          steps.checker.outcome != 'failure'
        run: echo "No availability found for August 4, 5, or 6. No action taken."

      - name: Log script error
        if: |
          steps.date_check.outputs.expired == 'false' &&
          steps.checker.outcome == 'failure'
        run: |
          echo "WARNING: The ticket checker script encountered an error."
          echo "Check the logs above. This may be a transient site issue."
